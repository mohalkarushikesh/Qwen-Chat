services:
  ollama:
    image: ollama/ollama:latest
    container_name: qwen-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  chatbot:
    build: .
    container_name: qwen-chatbot
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      PORT: "5000"
    expose:
      - "5000"
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: qwen-proxy
    depends_on:
      - chatbot
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  ollama-data: