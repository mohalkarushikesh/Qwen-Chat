<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oryza Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- marked.js for markdown parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- highlight.js for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --surface2:  #1b1f2b;
      --border:    #252a38;
      --accent:    #7ee8a2;
      --accent2:   #5bc4f5;
      --think-bg:  #1a1e2c;
      --think-border: #2e3650;
      --think-text: #7a8aaa;
      --text:      #e4e9f5;
      --text-muted:#6b7694;
      --user-bg:   #1c2235;
      --user-border:#2a3458;
      --radius:    14px;
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #0d0f14;
      letter-spacing: -1px;
    }
    header h1 {
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted); font-weight: 500;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message bubbles ── */
    .msg { display: flex; gap: 12px; animation: fadeUp .3s ease; }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .msg.user .avatar {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: var(--accent2);
    }
    .msg.assistant .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0f14;
    }

    .bubble {
      max-width: 78%;
      border-radius: var(--radius);
      padding: 12px 16px;
      line-height: 1.65;
      font-size: 14.5px;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: var(--text);
      border-top-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
      width: 100%;
    }

    /* ── Thinking block ── */
    .think-block {
      background: var(--think-bg);
      border: 1px solid var(--think-border);
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .think-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      user-select: none;
      color: var(--think-text);
      font-size: 12px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase;
      background: transparent;
      border: none; width: 100%; text-align: left;
      transition: color .2s;
    }
    .think-header:hover { color: var(--text-muted); }
    .think-icon { font-size: 14px; transition: transform .25s; }
    .think-block.open .think-icon { transform: rotate(90deg); }
    .think-body {
      padding: 0 14px;
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease, padding .3s ease;
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--think-text);
      line-height: 1.7;
    }
    .think-block.open .think-body {
      max-height: 800px;
      padding: 10px 14px 14px;
    }

    /* ── Markdown inside bubbles ── */
    .bubble p { margin-bottom: .75em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1,.bubble h2,.bubble h3 {
      font-family: var(--font-ui);
      margin: 1em 0 .4em;
      color: var(--accent);
    }
    .bubble h1 { font-size: 1.2em; }
    .bubble h2 { font-size: 1.1em; }
    .bubble h3 { font-size: 1em; }
    .bubble ul,.bubble ol { padding-left: 1.4em; margin-bottom: .75em; }
    .bubble li { margin-bottom: .3em; }
    .bubble code:not(pre code) {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 6px;
      font-family: var(--font-mono);
      font-size: .88em;
      color: var(--accent2);
    }
    .bubble pre {
      background: #0b0d13 !important;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: .75em 0;
      position: relative;
    }
    .bubble pre code {
      font-family: var(--font-mono);
      font-size: 12.5px;
      background: none !important;
      border: none !important;
      padding: 0 !important;
    }
    .copy-btn {
      position: absolute; top: 8px; right: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px;
      padding: 2px 8px; font-size: 11px; cursor: pointer;
      font-family: var(--font-ui); font-weight: 600;
      transition: all .2s;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: .75em 0;
      font-style: italic;
    }
    .bubble table { border-collapse: collapse; width: 100%; margin: .75em 0; font-size: .9em; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 12px; }
    .bubble th { background: var(--surface2); color: var(--accent); }
    .bubble strong { color: var(--accent2); }
    .bubble a { color: var(--accent); text-decoration: underline dotted; }
    .bubble hr { border-color: var(--border); margin: 1em 0; }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex; gap: 4px; padding: 4px 0; align-items: center;
    }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      animation: bounce .9s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .15s; }
    .typing-indicator span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── Empty state ── */
    #empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: var(--text-muted); text-align: center;
      padding: 40px;
    }
    #empty .big-icon { font-size: 48px; opacity: .4; }
    #empty p { font-size: 15px; max-width: 320px; line-height: 1.6; }
    #empty .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12.5px; color: var(--text-muted);
      cursor: pointer; transition: all .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input bar ── */
    #input-bar {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 16px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #prompt {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font-ui);
      font-size: 14.5px; resize: none; min-height: 24px; max-height: 160px;
      line-height: 1.5;
    }
    #prompt::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0f14; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity .2s, transform .15s;
      font-size: 16px;
    }
    #send-btn:hover { opacity: .85; transform: scale(1.05); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">O</div>
    <h1><span>Oryza Chatbot</span></h1>
    <div class="status-dot"><div class="dot"></div>Oryza AI</div>
  </header>

  <div id="messages">
    <div id="empty">
      <div class="big-icon">✦</div>
      <p>Start a conversation with your Oryza chatbot.</p>
      <div class="chips">
        <span class="chip" onclick="useChip(this)">Explain quantum computing</span>
        <span class="chip" onclick="useChip(this)">Write a Python script</span>
        <span class="chip" onclick="useChip(this)">Summarise a topic</span>
      </div>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-wrap">
      <textarea id="prompt" rows="1" placeholder="Message Oryza…"></textarea>
      <button id="send-btn" onclick="sendPrompt()" title="Send (Enter)">➤</button>
    </div>
    <p class="hint">Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
  // ── marked config ──
  marked.setOptions({ breaks: true, gfm: true });

  // ── Auto-resize textarea ──
  const ta = document.getElementById('prompt');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
  });

  function useChip(el) {
    ta.value = el.textContent;
    ta.dispatchEvent(new Event('input'));
    ta.focus();
  }

  // ── Parse Qwen's <think>…</think> tags ──
  function normalizeResponse(raw) {
    return raw
      .replace(/I am Qwen, a large language model developed by Alibaba Cloud/gi, 'I am Oryza, a chatbot developed by oryzalabs')
      .replace(/\bQwen Chat\b/gi, 'Oryza Chatbot')
      .replace(/\bQwen\b/gi, 'Oryza')
      .replace(/Alibaba Cloud/gi, 'oryzalabs')
      .replace(/large language model/gi, 'chatbot')
      .replace(/language model/gi, 'chatbot');
  }

  function parseQwenResponse(raw) {
    raw = normalizeResponse(raw);
    const thinkRegex = /<think>([\s\S]*?)<\/think>/gi;
    let thinking = [];
    let match;
    while ((match = thinkRegex.exec(raw)) !== null) thinking.push(match[1].trim());
    const cleaned = raw.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
    return { thinking, answer: cleaned };
  }

  // ── Render markdown with copy buttons ──
  function renderMarkdown(text) {
    const html = marked.parse(text);
    const wrap = document.createElement('div');
    wrap.innerHTML = html;
    wrap.querySelectorAll('pre').forEach(pre => {
      pre.style.position = 'relative';
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'copy';
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.querySelector('code').textContent);
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy', 1500);
      };
      pre.appendChild(btn);
    });
    wrap.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    return wrap;
  }

  // ── Build assistant bubble ──
  function buildAssistantBubble(raw) {
    const { thinking, answer } = parseQwenResponse(raw);
    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (thinking.length > 0) {
      thinking.forEach(t => {
        const block = document.createElement('div');
        block.className = 'think-block';
        block.innerHTML = `
          <button class="think-header" onclick="toggleThink(this)">
            <span class="think-icon">▶</span> Thinking
          </button>
          <div class="think-body">${escapeHtml(t)}</div>`;
        bubble.appendChild(block);
      });
    }

    if (answer) {
      const mdDiv = renderMarkdown(answer);
      bubble.appendChild(mdDiv);
    }
    return bubble;
  }

  function toggleThink(btn) {
    const block = btn.closest('.think-block');
    block.classList.toggle('open');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Append a message row ──
  function appendMsg(role, contentNode) {
    document.getElementById('empty')?.remove();

    const row = document.createElement('div');
    row.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'O';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (typeof contentNode === 'string') {
      bubble.textContent = contentNode;
    } else {
      row.querySelector; // unused
      // replace bubble with full pre-built bubble
      row.appendChild(avatar);
      row.appendChild(contentNode);
      const msgs = document.getElementById('messages');
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
      return row;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    const msgs = document.getElementById('messages');
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row;
  }

  // ── Typing indicator ──
  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg assistant'; row.id = 'typing-row';
    row.innerHTML = `
      <div class="avatar">O</div>
      <div class="bubble" style="padding:14px 16px">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    document.getElementById('messages').appendChild(row);
    document.getElementById('messages').scrollTop = 99999;
  }
  function hideTyping() { document.getElementById('typing-row')?.remove(); }

  // ── Main send ──
  async function sendPrompt() {
    const prompt = ta.value.trim();
    if (!prompt) return;

    // User message
    appendMsg('user', prompt);
    ta.value = ''; ta.style.height = 'auto';

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      hideTyping();

      const bubble = buildAssistantBubble(data.response || 'No response received.');
      appendMsg('assistant', bubble);

    } catch (err) {
      hideTyping();
      appendMsg('assistant', `⚠️ Error: ${err.message}`);
    } finally {
      btn.disabled = false;
      ta.focus();
    }
  }
</script>
</body>
</html>
